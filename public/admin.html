<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Upload - Vibe Kids Studio</title>
    <link rel="stylesheet" href="/assets/styles.css">
    <script type="module" src="/assets/admin.js"></script>
  </head>
  <body data-page="admin">
    <header class="site-header">
      <a class="brand-link" href="/">Vibe Kids Studio</a>
      <nav class="site-nav" aria-label="Primary navigation">
        <a href="/">Gallery</a>
      </nav>
    </header>

    <main class="page-shell admin-shell">
      <p class="eyebrow">Project upload</p>
      <h1>Add a new coding project.</h1>

      <form id="upload-form" class="upload-form">
        <div class="field-block">
          <label for="project">Project zip</label>
          <input id="project" name="project" type="file" accept=".zip,application/zip" required>
          <p class="field-help">Upload a zip that contains an index.html file.</p>
        </div>

        <div class="field-grid">
          <div class="field-block">
            <label for="title">Title</label>
            <input id="title" name="title" type="text" autocomplete="off">
          </div>

          <div class="field-block">
            <label for="date">Date</label>
            <input id="date" name="date" type="date">
          </div>
        </div>

        <div class="field-block">
          <label for="description">Description</label>
          <textarea id="description" name="description" rows="4"></textarea>
        </div>

        <div class="field-grid">
          <div class="field-block">
            <label for="cover">Cover</label>
            <input id="cover" name="cover" type="text" autocomplete="off">
            <p class="field-help">Path inside the zip, such as cover.png.</p>
          </div>

          <div class="field-block">
            <label for="tags">Tags</label>
            <input id="tags" name="tags" type="text" autocomplete="off">
            <p class="field-help">Separate tags with commas.</p>
          </div>
        </div>

        <button class="primary-button" type="submit">Upload project</button>
        <p id="upload-status" class="form-status" role="status" aria-live="polite"></p>
      </form>
    </main>
  </body>
</html>
